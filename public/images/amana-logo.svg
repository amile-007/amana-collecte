<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <!-- Carré rouge avec A stylisé -->
  <rect width="56" height="56" rx="12" fill="#E30613"/>
  <text x="28" y="40" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="34" fill="white" text-anchor="middle" letter-spacing="-1">A</text>

  <!-- Texte AMANA -->
  <text x="72" y="28" font-family="Arial Black, Arial, sans-serif" font-weight="900"
